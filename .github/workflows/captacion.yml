name: Captación de Leads

on:
  # Corre automáticamente cada día a las 8am hora Argentina (11:00 UTC)
  schedule:
    - cron: "0 11 * * *"

  # También se puede disparar manualmente desde GitHub → Actions → Run workflow
  workflow_dispatch:

jobs:
  scraping:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: captacion/requirements.txt

      - name: Instalar dependencias Python
        run: pip install -r captacion/requirements.txt

      - name: Instalar dependencias del sistema para Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxss1 \
            libx11-xcb1 libxcb-dri3-0 libxshmfence1

      - name: Instalar Playwright + Chromium
        run: python -m playwright install chromium

      - name: Crear .env con credenciales
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > captacion/.env

      - name: Correr pipeline de captación
        run: python captacion/src/main.py

      - name: Subir log como artefacto (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: captacion-log-${{ github.run_number }}
          path: captacion/*.log
          if-no-files-found: ignore
          retention-days: 7
